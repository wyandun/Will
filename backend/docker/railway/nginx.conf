server {
    listen $PORT;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;

    client_max_body_size 64M;

    # -----------------------------------------------------------------
    # Uploaded files (process documents, avatars, feed attachments).
    # public/storage is a symlink to storage/app/public, which on Railway
    # is backed by a PERSISTENT VOLUME (see start.sh + railway.toml notes).
    # Serve these directly from disk; a missing file returns a clean 404
    # instead of falling through to index.php (which previously surfaced as
    # a confusing 403 once the ephemeral file was gone after a redeploy).
    # -----------------------------------------------------------------
    location ^~ /storage {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;

        # Explicit overrides so envsubst cannot clobber these even if the
        # variable-list guard ever breaks — and to ensure PHP always receives
        # the original request URI regardless of internal rewrites.
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME     $fastcgi_script_name;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param PATH_INFO       "";

        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    location ~ /\.ht {
        deny all;
    }
}
