; SM Portal — OPcache settings
; These values are tuned for a production Laravel application.

opcache.enable                 = 1
opcache.enable_cli             = 0

; Number of scripts the cache can hold (Laravel + dependencies)
opcache.max_accelerated_files  = 20000

; Disable revalidation in production — files don't change at runtime
; Set to 1 in local dev if you need to see code changes without restart
opcache.validate_timestamps    = 0

; Memory allocated to the opcode cache (MB)
opcache.memory_consumption     = 128

; Memory for interned strings
opcache.interned_strings_buffer = 16

; Preload the Laravel framework on PHP-FPM startup (PHP 8.x)
; Uncomment and point to the correct path after creating the Laravel project:
; opcache.preload                = /var/www/html/bootstrap/preload.php
; opcache.preload_user           = www-data
