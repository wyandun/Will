; SM Portal — Custom PHP runtime settings

; File uploads (contracts, documents, OCR inputs)
upload_max_filesize = 64M
post_max_size       = 64M

; Execution limits — raise for long AI / BPMN jobs if needed
max_execution_time  = 300
max_input_time      = 300
memory_limit        = 256M

; Timezone
date.timezone = America/New_York

; Never expose PHP version in HTTP response headers
expose_php = Off
