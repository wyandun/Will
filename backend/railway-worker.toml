# railway-worker.toml — SM Portal queue worker service
# This file is assigned to the "worker" Railway service in the dashboard.
# It is NOT the primary web service config — that is railway.toml.
# Docs: https://docs.railway.com/reference/config-as-code

[build]
# Use the same Dockerfile as the web service, targeting the railway stage.
dockerfilePath = "Dockerfile"
dockerBuildTarget = "railway"

[deploy]
# Override the CMD from the railway stage: run the queue worker instead of the web server.
# IMPORTANT: ENTRYPOINT is [] (empty exec array) in the railway stage, so Railway passes
# startCommand directly as the Docker CMD in exec form — no shell is injected automatically.
# The && chain requires an explicit /bin/sh -c wrapper, exactly like preDeployCommand in railway.toml.
startCommand = "/bin/sh /usr/local/bin/railway-worker.sh"
# Workers have no HTTP interface — disable the healthcheck entirely.
healthcheckPath = ""
# Restart on failure so transient DB/Redis blips recover automatically.
# ON_FAILURE only triggers on non-zero exit — queue:work exits non-zero on fatal errors.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
