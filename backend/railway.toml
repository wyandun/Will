# railway.toml — SM Portal backend
# Railway deployment configuration.
# Docs: https://docs.railway.com/reference/config-as-code
#
# ---------------------------------------------------------------------------
# PERSISTENT STORAGE (REQUIRED) — manual dashboard step, NOT config-as-code.
# Railway's container filesystem is ephemeral: anything written at runtime is
# lost on every redeploy. Uploaded files (process documents, avatars, feed
# attachments) are written to storage/app/public and served via the public
# /storage URL, so without a volume they vanish after a deploy and /storage
# returns 403/404.
#
# Railway volumes cannot be declared in railway.toml — attach one in the
# dashboard:
#   Service (backend) → Settings → Volumes → New Volume
#     Mount path: /var/www/html/storage/app/public
# After attaching, redeploy once. start.sh chmods the mount so PHP-FPM can
# write to it, and the public/storage symlink is (re)created every boot.
# See docs/railway-storage-volume.md for the full procedure.
# ---------------------------------------------------------------------------

[build]
# Use the Dockerfile in this directory.
# The "railway" stage runs Nginx + PHP-FPM — suitable for production.
dockerfilePath = "Dockerfile"
dockerBuildTarget = "railway"

[deploy]
# Pre-deploy runs ONCE before the new container goes live, while the old one
# still serves traffic. Migrations are safe here because Laravel migrations
# are designed to be forward-compatible (no destructive column drops in the
# same migration that adds a new one).
#
# optimize:clear is intentionally omitted — Railway's ephemeral filesystem
# never has stale compiled caches from a previous deploy.
preDeployCommand = "/bin/sh -c \"php artisan migrate --force && php artisan db:seed --force && php artisan permission:cache-reset\""
# Railway injects $PORT at runtime. The CMD in the railway stage reads it.
# Do NOT define PORT manually in Railway variables — let Railway inject it.
healthcheckPath = "/api/v1/ping"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
