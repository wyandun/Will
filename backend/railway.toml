# railway.toml — SM Portal backend
# Railway deployment configuration.
# Docs: https://docs.railway.com/reference/config-as-code

[build]
# Use the Dockerfile in this directory.
# The "railway" stage is a PHP built-in server — suitable for shared dev.
dockerfilePath = "Dockerfile"
dockerBuildTarget = "railway"

[deploy]
# PORT=8080 is set here so Railway's edge proxy and the PHP server agree on
# the same port. Railway injects PORT at runtime but uses the EXPOSE hint to
# know which port to forward to — pinning it here removes the ambiguity.
startCommand = "php artisan migrate --force && php -S 0.0.0.0:8080 -t public"
healthcheckPath = "/api/v1/ping"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
