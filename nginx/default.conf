# SM Portal — Nginx configuration
# Responsibilities:
#   1. Proxy /api/* and /sanctum/* to the Laravel PHP-FPM backend on port 9000
#   2. Serve the React production build (SPA) for all other routes
#   3. Serve Laravel's /public directory for assets (storage links, etc.)

server {
    listen 80;
    server_name _;

    # Character encoding
    charset utf-8;

    # -----------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # -----------------------------------------------------------------
    # Security headers (basic set — extend for production HTTPS)
    # -----------------------------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"             always;
    add_header X-Content-Type-Options "nosniff"                always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # -----------------------------------------------------------------
    # File upload limit — raise if contracts / documents can be large
    # -----------------------------------------------------------------
    client_max_body_size 64M;

    # -----------------------------------------------------------------
    # API routes → Laravel PHP-FPM
    # All requests to /api and Laravel Sanctum CSRF endpoints are
    # forwarded to the backend container on port 9000.
    # -----------------------------------------------------------------
    location ~ ^/(api|sanctum|docs)(/|$) {
        root /var/www/html/public;

        # index.php is the Laravel front controller
        index index.php;

        # Try the URI as-is first, then fall through to the PHP handler
        try_files $uri $uri/ @php;
    }

    # Named location — handles the PHP-FPM pass for Laravel
    # Using a named location (@php) guarantees Nginx re-enters location
    # matching cleanly instead of relying on the \.php$ regex catching
    # the internal rewrite from try_files.
    location @php {
        root /var/www/html/public;

        fastcgi_pass   backend:9000;
        fastcgi_index  index.php;

        include        fastcgi_params;

        # SCRIPT_FILENAME must point to the absolute path inside the
        # backend container, not on the Nginx container filesystem.
        fastcgi_param  SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param  SCRIPT_NAME     /index.php;

        # Forward the original request URI so Laravel routing works correctly
        fastcgi_param  REQUEST_URI     $request_uri;

        # Timeouts — adjust if long-running requests are expected (BPMN AI translation, etc.)
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # Pass PHP scripts to PHP-FPM
    # This block handles direct .php file requests (e.g. /index.php itself).
    location ~ \.php$ {
        # Only process PHP files inside the Laravel public directory
        root /var/www/html/public;

        fastcgi_pass   backend:9000;
        fastcgi_index  index.php;

        include        fastcgi_params;

        # SCRIPT_FILENAME must point to the absolute path inside the
        # backend container, not on the Nginx container filesystem.
        fastcgi_param  SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;

        # Timeouts — adjust if long-running requests are expected (BPMN AI translation, etc.)
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # -----------------------------------------------------------------
    # Laravel public assets (storage symlink, vendor assets, etc.)
    # Anything under /storage or static files in /public
    # -----------------------------------------------------------------
    location ^~ /storage {
        root /var/www/html/public;
        try_files $uri =404;
    }

    # -----------------------------------------------------------------
    # React SPA — proxy to Vite dev server (hot reload)
    # -----------------------------------------------------------------
    location / {
        proxy_pass http://sm_frontend_dev:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Deny access to hidden files (e.g. .env, .git) — exclude Vite's /.vite/ dev paths
    location ~ /\.(?!vite) {
        deny all;
        return 404;
    }
}
